name: Weekly Article Scheduler
on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at 00:00 UTC
  workflow_dispatch:      # Manual trigger

jobs:
  publish-article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (if any)
        run: npm ci --only=production || echo 'No package.json'

      - name: Run scheduler
        run: node update-scheduler.js
